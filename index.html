<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NATACULT MARKET SCANNER</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #050505; color: #d4af37; font-family: 'Courier New', monospace; margin: 0; padding: 10px; border: 1px solid #d4af37; box-sizing: border-box; min-height: 100vh; }
        .header { text-align: center; border-bottom: 2px solid #d4af37; padding: 10px 0; margin-bottom: 15px; background: rgba(212, 175, 55, 0.05); }
        .scan-line { font-size: 10px; color: #00ff00; margin-bottom: 10px; height: 15px; overflow: hidden; opacity: 0.7; }
        
        .prediction-item { border-left: 3px solid #d4af37; background: #111; margin-bottom: 12px; padding: 10px; position: relative; }
        .skin-name { color: #fff; font-size: 14px; font-weight: bold; }
        .trend { display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 12px; margin-top: 5px; font-weight: bold; }
        .up { background: rgba(0, 255, 0, 0.2); color: #00ff00; }
        .reason { font-size: 11px; color: #ccc; margin-top: 8px; line-height: 1.3; }
        .probability { position: absolute; top: 10px; right: 10px; font-size: 12px; color: #d4af37; border: 1px solid #d4af37; padding: 2px 4px; }
        
        /* Стили для калькулятора */
        .calc-card { border: 1px solid #888; background: #111; margin-bottom: 12px; padding: 10px; border-radius: 4px; }
        input { width: 90%; background: #000; border: 1px solid #d4af37; color: #fff; margin-top: 10px; padding: 8px; font-family: inherit; }
        #result-calc { font-size: 13px; margin-top: 10px; color: #00ff00; font-weight: bold; }

        .exit-btn { width: 100%; background: transparent; border: 1px solid #d4af37; color: #d4af37; padding: 10px; cursor: pointer; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-size: 16px; letter-spacing: 2px;">🔱 NATACULT SCANNER </div>
    <div style="font-size: 9px; opacity: 0.6;">DEEP ANALYTICS // CALC_V1.0</div>
</div>

<div class="scan-line" id="scanner-text">Initializing deep market scan...</div>

<div id="predictions-container">
    </div>

<div class="calc-card">
    <div class="skin-name" style="color: #d4af37;">🧮 STEAM PROFIT CALCULATOR</div>
    <div style="font-size: 10px; color: #aaa;">Введи цену продажи, чтобы узнать чистый доход (-13%):</div>
    <input type="number" id="buy-price" placeholder="Цена в $">
    <div id="result-calc">ЧИСТЫЙ ВЫХОД: $0.00</div>
</div>

<button class="exit-btn" onclick="Telegram.WebApp.close()">EXIT TERMINAL</button>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    // Логи сканера
    const scanLogs = ["[LOG]: Scanning Buff...", "[LOG]: Steam prices OK", "[LOG]: Comparing floats...", "[LOG]: Found 3 anomalies."];
    let logI = 0;
    setInterval(() => {
        document.getElementById('scanner-text').innerText = scanLogs[logI];
        logI = (logI + 1) % scanLogs.length;
    }, 2500);

    // Отрисовка сигналов
    function render() {
        const container = document.getElementById('predictions-container');
        const signals = [
            { name: "M4A1-S | Printstream (FT)", change: "+12.4%", prob: "84", reason: "Supply drop on Steam Market." },
            { name: "Butterfly | Tiger Tooth (FN)", change: "+5.2%", prob: "68", reason: "Undervalued anomaly detected." }
        ];
        signals.forEach(sig => {
            container.innerHTML += `
                <div class="prediction-item">
                    <div class="skin-name">${sig.name}</div>
                    <div class="probability">${sig.prob}%</div>
                    <div class="trend up">📈 ${sig.change}</div>
                    <div class="reason"><b>ANALYSIS:</b> ${sig.reason}</div>
                </div>`;
        });
    }
    render();

    // Логика калькулятора
    document.getElementById('buy-price').addEventListener('input', function(e) {
        let val = e.target.value;
        let clear = val * 0.87; 
        document.getElementById('result-calc').innerText = "ЧИСТЫЙ ВЫХОД: $" + clear.toFixed(2);
    });
</script>
</body>
</html>
