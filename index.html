<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NATACULT OS V4.0</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --blue: #00d2ff; --dark: #000814; --glass: rgba(255, 255, 255, 0.07); --accent: #00ffcc; --gold: #ffd700; }
        body { background: radial-gradient(circle at top right, #001d3d 0%, var(--dark) 100%); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        
        .header { padding: 20px; text-align: center; border-bottom: 1px solid rgba(0, 210, 255, 0.2); backdrop-filter: blur(10px); sticky; top: 0; z-index: 100; }
        
        /* RANK SYSTEM */
        .rank-card { background: linear-gradient(90deg, rgba(0,210,255,0.1), rgba(255,215,0,0.1)); border: 1px solid var(--gold); margin: 15px; padding: 10px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
        .rank-name { color: var(--gold); font-weight: bold; font-size: 12px; text-transform: uppercase; }

        .update-timer { font-size: 9px; color: var(--accent); text-align: center; margin-bottom: 10px; opacity: 0.8; }

        .ai-search-card { border: 1px solid var(--blue); background: rgba(0,210,255,0.05); margin: 15px; border-radius: 15px; padding: 15px; }
        .tabs { display: flex; gap: 8px; padding: 0 15px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 12px; background: var(--glass); border: 1px solid rgba(0, 210, 255, 0.2); border-radius: 12px; color: var(--blue); font-size: 10px; font-weight: 800; text-align: center; }
        .tab.active { background: var(--blue); color: #000; box-shadow: 0 0 20px var(--blue); }

        .asset-card { background: var(--glass); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); border-radius: 20px; padding: 20px; margin: 0 15px 15px 15px; position: relative; }
        .price { font-size: 24px; font-weight: 900; color: var(--blue); }
        
        .news-ticker { background: rgba(255,255,255,0.03); border: 1px dashed rgba(255,255,255,0.2); margin: 15px; padding: 10px; font-size: 11px; color: #aaa; overflow: hidden; white-space: nowrap; }

        input { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(0, 210, 255, 0.3); color: #fff; border-radius: 12px; margin: 5px 0; box-sizing: border-box; }
        button { background: var(--blue); color: #000; border: none; border-radius: 8px; padding: 10px; font-weight: bold; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-size: 20px; font-weight: 900; letter-spacing: 2px;">NATACULT <span style="color:var(--blue)">OS</span></div>
</div>

<div class="rank-card">
    <span>USER RANK: <span class="rank-name" id="user-rank">PLANKTON 🐟</span></span>
    <span style="font-size: 10px; opacity: 0.7;">VOL: $0.00</span>
</div>

<div class="update-timer" id="timer-label">NEXT MARKET UPDATE: 29:59</div>

<div class="news-ticker" id="news-line">NEWS: Аналитики ожидают выход новой операции в CS2...</div>

<div class="ai-search-card">
    <div style="font-size: 10px; color: var(--blue); font-weight: bold; margin-bottom: 10px;">🧠 AI PREDICT ENGINE (BETA)</div>
    <input type="text" id="ai-input" placeholder="Напр: M4A4 Howl">
    <button onclick="askAI()" style="margin-top:5px;">АНАЛИЗ</button>
    <div id="ai-response" style="display: none; margin-top: 15px; font-size: 12px; border-top: 1px solid rgba(0,210,255,0.2); padding-top: 10px;"></div>
</div>

<div class="tabs">
    <div class="tab active" onclick="loadCat('low', this)">LOW</div>
    <div class="tab" onclick="loadCat('med', this)">MEDIUM</div>
    <div class="tab" onclick="loadCat('high', this)">HIGH</div>
</div>

<div id="content-list"></div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // 1. СИСТЕМА ОБНОВЛЕНИЯ (КАЖДЫЕ 30 МИНУТ)
    let timeLeft = 1800; // 30 минут в секундах
    function startTimer() {
        setInterval(() => {
            if (timeLeft <= 0) {
                timeLeft = 1800;
                refreshMarketData(); // Обновляем цены
            }
            timeLeft--;
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            document.getElementById('timer-label').innerText = `NEXT MARKET UPDATE: ${mins}:${secs < 10 ? '0'+secs : secs}`;
        }, 1000);
    }

    function refreshMarketData() {
        // Имитация изменения цен на 1-3% каждые 30 минут
        for (let cat in db) {
            db[cat].forEach(item => {
                let change = (Math.random() * 2 - 1).toFixed(2);
                let currentPrice = parseFloat(item.price.replace('$', ''));
                item.price = `$${(currentPrice + (currentPrice * (change/100))).toFixed(2)}`;
            });
        }
        loadCat(activeCat); // Перерисовать текущую категорию
    }

    let activeCat = 'low';
    const db = {
        low: [{ name: "Recoil Case", price: "$1.45", grow: "+182%", hist: [10, 40, 80, 120, 160, 182] }],
        med: [{ name: "AK-47 | Slate (FN)", price: "$12.80", grow: "+64%", hist: [5, 15, 25, 45, 55, 64] }],
        high: [{ name: "Butterfly | Doppler", price: "$1840", grow: "+210%", hist: [10, 70, 120, 180, 200, 210] }]
    };

    function loadCat(cat, el) {
        activeCat = cat;
        if(el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        }
        const list = document.getElementById('content-list');
        list.innerHTML = '';
        db[cat].forEach((item, i) => {
            const canvasId = `c-${cat}-${i}`;
            list.innerHTML += `
                <div class="asset-card">
                    <div style="font-weight: bold; font-size: 14px;">${item.name}</div>
                    <div class="price">${item.price}</div>
                    <canvas id="${canvasId}" style="max-height: 100px; margin-top:10px;"></canvas>
                </div>`;
            setTimeout(() => {
                const ctx = document.getElementById(canvasId).getContext('2d');
                new Chart(ctx, {
                    type: 'line',
                    data: { labels: [1,2,3,4,5,6], datasets: [{ data: item.hist, borderColor: '#00d2ff', borderWidth: 3, tension: 0.4, pointRadius: 0, fill: true, backgroundColor: 'rgba(0, 210, 255, 0.1)' }] },
                    options: { plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
                });
            }, 50);
        });
    }

    function askAI() {
        const res = document.getElementById('ai-response');
        res.style.display = 'block';
        res.innerHTML = "ANALYZING PATTERNS...";
        setTimeout(() => { res.innerHTML = `<span style="color:var(--accent)">ВЕРДИКТ: BULLISH.</span> Объемы Buff163 подтверждают закуп.`; }, 1200);
    }

    startTimer();
    loadCat('low');
</script>
</body>
</html>
