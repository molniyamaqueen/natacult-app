<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRIME NODE ULTIMA</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --blue: #00d2ff; --dark: #000814; --glass: rgba(255, 255, 255, 0.05); --accent: #00ffcc; }
        body { background: #000814; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow: hidden; }
        .screen { display: none; height: 100vh; overflow-y: auto; padding-bottom: 100px; box-sizing: border-box; }
        .screen.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: rgba(0, 8, 20, 0.95); backdrop-filter: blur(20px); display: flex; border-top: 1px solid rgba(0, 210, 255, 0.1); z-index: 1000; }
        .nav-item { flex: 1; text-align: center; padding: 15px 0; font-size: 10px; color: #668ba4; cursor: pointer; }
        .nav-item.active { color: var(--blue); text-shadow: 0 0 10px var(--blue); }
        .nav-item span { display: block; font-size: 20px; }

        .card { background: var(--glass); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 20px; padding: 18px; margin: 15px; backdrop-filter: blur(10px); }
        .price { font-size: 24px; font-weight: 900; color: var(--blue); }
        
        /* Калькулятор UI */
        .calc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid rgba(0, 210, 255, 0.2); color: #fff; border-radius: 12px; outline: none; box-sizing: border-box; }
        .res-box { background: rgba(0, 255, 204, 0.05); border: 1px solid var(--accent); padding: 15px; border-radius: 12px; margin-top: 15px; text-align: center; color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

    <div id="screen-market" class="screen active">
        <div style="padding: 25px 20px 10px;">
            <div style="font-size: 22px; font-weight: 900; letter-spacing: 2px;">PRIME <span style="color:var(--blue)">NODE</span></div>
            <div style="font-size: 10px; color: var(--accent); margin-top: 5px;">LIVE MARKET FEED</div>
        </div>
        <div id="market-list"></div>
    </div>

    <div id="screen-calc" class="screen">
        <div class="card">
            <h3 style="margin-top:0">🧮 ROI CALCULATOR</h3>
            <p style="font-size:12px; opacity:0.6">Рассчитай чистую прибыль с учетом комиссии площадки (15%).</p>
            <div class="calc-grid">
                <div>
                    <label style="font-size:10px">ЦЕНА ЗАКУПА ($)</label>
                    <input type="number" id="buy-price" placeholder="0.00" oninput="calcROI()">
                </div>
                <div>
                    <label style="font-size:10px">ЦЕНА ПРОДАЖИ ($)</label>
                    <input type="number" id="sell-price" placeholder="0.00" oninput="calcROI()">
                </div>
            </div>
            <div id="calc-result" class="res-box">PROFIT: $0.00 (0%)</div>
        </div>
    </div>

    <div id="screen-news" class="screen">
        <div style="padding: 20px;">
            <h3>📰 INSIDER FEED</h3>
            <div id="news-list"></div>
        </div>
    </div>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="showScreen('market', this)"><span>📊</span>Market</div>
        <div class="nav-item" onclick="showScreen('calc', this)"><span>🧮</span>Calc</div>
        <div class="nav-item" onclick="showScreen('news', this)"><span>📰</span>News</div>
    </nav>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    function showScreen(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen-' + id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }

    // 1. Автоматическая смена скинов (убрали таймер)
    const skins = [
        { n: "AK-47 | Nightwish", p: 85.40, g: "+4.2%" },
        { n: "M4A1-S | Printstream", p: 142.10, g: "+1.8%" },
        { n: "AWP | Gungnir", p: 12400, g: "+0.4%" },
        { n: "Glove | Vice", p: 940.00, g: "-1.2%" },
        { n: "Desert Eagle | Blaze", p: 620.45, g: "+5.1%" }
    ];

    function updateMarket() {
        const list = document.getElementById('market-list');
        // Берем случайные 3 скина из базы
        const shuffled = skins.sort(() => 0.5 - Math.random()).slice(0, 3);
        list.innerHTML = shuffled.map(s => `
            <div class="card">
                <div style="font-size:12px; color:var(--accent); font-weight:bold">LIVE SIGNAL</div>
                <div style="font-size:18px; font-weight:bold; margin: 10px 0;">${s.n}</div>
                <div style="display:flex; justify-content:space-between; align-items:center">
                    <div class="price">$${s.p}</div>
                    <div style="color:${s.g.includes('+')?'var(--accent)':'#ff4b2b'}">${s.g}</div>
                </div>
            </div>
        `).join('');
    }
    setInterval(updateMarket, 5000); // Меняем каждые 5 сек для динамики
    updateMarket();

    // 2. Калькулятор
    function calcROI() {
        const buy = parseFloat(document.getElementById('buy-price').value) || 0;
        const sell = parseFloat(document.getElementById('sell-price').value) || 0;
        const fee = sell * 0.15;
        const netProfit = sell - buy - fee;
        const roi = buy > 0 ? (netProfit / buy * 100).toFixed(2) : 0;
        document.getElementById('calc-result').innerText = `PROFIT: $${netProfit.toFixed(2)} (${roi}%)`;
    }

    // 3. Бесконечные новости
    const newsBase = [
        "Valve обновили политику трейда: ожидаем просадку ликвидности.",
        "Китайские коллекционеры начали массово скупать сувенирные наборы.",
        "Аномальный рост цен на Doppler Phase 2 за последние 4 часа.",
        "Инсайдеры сообщают о скором выходе новой операции.",
        "Рынок перешел в стадию экстремальной жадности. Фиксируйте профит."
    ];

    function addNews() {
        const list = document.getElementById('news-list');
        const n = newsBase[Math.floor(Math.random() * newsBase.length)];
        const time = new Date().toLocaleTimeString();
        const html = `
            <div class="card" style="margin: 0 0 10px 0;">
                <div style="color:var(--blue); font-size:10px">${time}</div>
                <div style="font-size:13px; margin-top:5px">${n}</div>
            </div>
        `;
        list.insertAdjacentHTML('afterbegin', html);
        if(list.children.length > 10) list.lastChild.remove();
    }
    setInterval(addNews, 10000); // Новая новость каждые 10 сек
    addNews(); addNews(); // Сразу пару штук
</script>
</body>
</html>
