<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NATACULT TERMINAL</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #0a0a0a; color: #d4af37; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; border: 2px solid #d4af37; box-sizing: border-box; }
        .header { font-size: 22px; font-weight: bold; letter-spacing: 3px; margin-bottom: 20px; text-align: center; }
        .status-box { border: 1px solid #d4af37; padding: 15px; width: 85%; background: rgba(212, 175, 55, 0.05); }
        .price-line { margin: 10px 0; font-size: 16px; color: #fff; }
        .price-line span { color: #d4af37; font-weight: bold; }
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
        button { margin-top: 20px; background: #d4af37; border: none; color: black; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="header">🔱 NATACULT LIVE FEED 🔱</div>
    <div class="status-box">
        <div class="price-line">BTC/USD: <span id="btc-price">FETCHING...</span></div>
        <div class="price-line">ETH/USD: <span id="eth-price">FETCHING...</span></div>
        <div class="price-line" style="font-size: 12px; opacity: 0.7;">> SYSTEM STATUS: <span class="blink">ENCRYPTED_LINK_ACTIVE</span></div>
    </div>
    <button onclick="location.reload()">REFRESH DATA</button>

    <script>
    let tg = window.Telegram.WebApp;
    tg.expand(); // Разворачиваем на весь экран

    // Текст для бегущей строки сканера
    const scanLogs = [
        "[LOG]: Connecting to Steam Community Market...",
        "[LOG]: Analyzing 24h volume for M4A1-S...",
        "[LOG]: Pattern anomaly detected: Case Hardened #661",
        "[LOG]: Comparing prices: Skinport vs Steam...",
        "[LOG]: Buff163 liquidity check: OK",
        "[LOG]: Deep scan complete. Found 3 high-profit signals."
    ];

    let logIndex = 0;
    const scannerText = document.getElementById('scanner-text');

    // Анимация логов сканера
    setInterval(() => {
        scannerText.innerText = scanLogs[logIndex];
        logIndex = (logIndex + 1) % scanLogs.length;
    }, 2000);

    // Функция отрисовки предиктов
    function renderPredictions() {
        const container = document.getElementById('predictions-container');
        container.innerHTML = ''; // Очистка перед загрузкой

        // Данные предиктов (Сюда мы будем выводить аналитику)
        const signals = [
            {
                name: "M4A1-S | Printstream (FT)",
                change: "+12.4%",
                prob: "84",
                time: "2-4 days",
                reason: "Supply drop on Steam Market. High demand for low-float crafts."
            },
            {
                name: "Recoil Case",
                change: "+25.0%",
                prob: "91",
                time: "1-2 weeks",
                reason: "Drop rate reduction confirmed. Daily volume +400% on Buff."
            },
            {
                name: "Butterfly Knife | Tiger Tooth (FN)",
                change: "+5.2%",
                prob: "68",
                time: "24 hours",
                reason: "Undervalued anomaly. Price floor rising on 3rd party markets."
            }
        ];

        signals.forEach(sig => {
            const html = `
                <div class="prediction-item">
                    <div class="skin-name">${sig.name}</div>
                    <div class="probability">${sig.prob}%</div>
                    <div class="trend up">📈 ${sig.change}</div>
                    <div class="reason"><b>ANALYSIS:</b> ${sig.reason}</div>
                    <div style="font-size: 10px; color: #d4af37; margin-top: 5px;">TIMEFLOW: ${sig.time}</div>
                </div>
            `;
            container.innerHTML += html;
        });
    }

    // Запуск рендера через 1.5 секунды (эффект загрузки)
    setTimeout(renderPredictions, 1500);

    </script>
</body>
</html>
