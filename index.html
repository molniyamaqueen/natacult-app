<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>PRIME NODE ULTIMA</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --blue: #00d2ff; --dark: #000814; --glass: rgba(255, 255, 255, 0.05); --accent: #00ffcc; --red: #ff4b2b; }
        body { background: #000814; color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; overflow: hidden; user-select: none; -webkit-user-select: none; }
        
        .screen { display: none; height: 100vh; overflow-y: auto; padding-bottom: 100px; box-sizing: border-box; }
        .screen.active { display: block; animation: fadeIn 0.3s ease; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #screen-lang {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 2000;
            padding: 20px;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
        }
        #screen-lang.active { display: flex; }

        .lang-btn {
            width: 100%;
            max-width: 280px;
            padding: 18px;
            margin: 8px 0;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(0,210,255,0.2);
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .lang-btn:active { transform: scale(0.96); background: rgba(0,210,255,0.1); border-color: var(--blue); }

        .nav-bar { position: fixed; bottom: 0; width: 100%; background: rgba(0, 8, 20, 0.9); backdrop-filter: blur(15px); display: flex; border-top: 1px solid rgba(0, 210, 255, 0.1); z-index: 1000; }
        .nav-item { flex: 1; text-align: center; padding: 12px 0; font-size: 10px; color: #668ba4; transition: 0.2s; }
        .nav-item.active { color: var(--blue); }
        .nav-icon { display: block; font-size: 20px; margin-bottom: 2px; }

        .card { background: var(--glass); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 18px; padding: 15px; margin: 12px; backdrop-filter: blur(10px); }
        .price { font-size: 22px; font-weight: 900; color: var(--blue); }
        
        input { width: 100%; padding: 12px; background: #000; border: 1px solid rgba(0, 210, 255, 0.2); color: #fff; border-radius: 10px; outline: none; box-sizing: border-box; font-size: 16px; }
        .res-box { background: rgba(0, 255, 204, 0.05); border: 1px solid var(--accent); padding: 12px; border-radius: 10px; margin-top: 15px; text-align: center; color: var(--accent); font-size: 14px; }
    </style>
</head>
<body>

    <div id="screen-lang" class="screen" style="background: radial-gradient(circle at center, #001a33 0%, #000814 100%);">
        <div style="margin-bottom: 30px;">
            <div style="font-size: 45px;">🔱</div>
            <h1 style="letter-spacing: 3px; margin: 5px 0;">PRIME <span style="color:var(--blue)">NODE</span></h1>
            <p data-t="lang_subtitle" style="font-size: 9px; opacity: 0.5; letter-spacing: 1px;">NEURAL QUANTUM TERMINAL</p>
        </div>
        <div class="lang-btn" onclick="setLang('ru')"><span>🇷🇺 РУССКИЙ</span><span>→</span></div>
        <div class="lang-btn" onclick="setLang('ua')"><span>🇺🇦 УКРАЇНСЬКА</span><span>→</span></div>
        <div class="lang-btn" onclick="setLang('en')"><span>🇺🇸 ENGLISH</span><span>→</span></div>
    </div>

    <div id="screen-market" class="screen">
        <div style="padding: 20px;">
            <div style="font-size: 18px; font-weight: 900;">PRIME <span style="color:var(--blue)">NODE</span></div>
            <div data-t="live_feed" style="font-size: 9px; color: var(--accent);">LIVE MARKET FEED</div>
        </div>
        <div id="market-list"></div>
    </div>

    <div id="screen-calc" class="screen">
        <div class="card">
            <h3 style="margin-top:0"><span data-t="calc_title">ROI CALCULATOR</span></h3>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div>
                    <label style="font-size:10px; opacity: 0.6;"><span data-t="buy">BUY</span> ($)</label>
                    <input type="number" id="buy-price" placeholder="0.00" oninput="calcROI()">
                </div>
                <div>
                    <label style="font-size:10px; opacity: 0.6;"><span data-t="sell">SELL</span> ($)</label>
                    <input type="number" id="sell-price" placeholder="0.00" oninput="calcROI()">
                </div>
            </div>
            <div id="calc-result" class="res-box">ROI: 0%</div>
        </div>
    </div>

    <div id="screen-news" class="screen">
        <div style="padding: 20px;">
            <h3 data-t="news">NEWS</h3>
            <div id="news-list"></div>
        </div>
    </div>

    <nav class="nav-bar" id="main-nav" style="display: none;">
        <div class="nav-item active" onclick="showScreen('market', this)"><span class="nav-icon">📊</span><span data-t="market">Market</span></div>
        <div class="nav-item" onclick="showScreen('calc', this)"><span class="nav-icon">🧮</span><span data-t="calc">Calc</span></div>
        <div class="nav-item" onclick="showScreen('news', this)"><span class="nav-icon">📰</span><span data-t="news">News</span></div>
    </nav>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    const translations = {
        ru: { market: "МАРКЕТ", calc: "КАЛЬКУЛЯТОР", news: "НОВОСТИ", buy: "ЗАКУП", sell: "ПРОДАЖА", profit: "ПРИБЫЛЬ", liq_check: "ЛИКВИДНОСТЬ", lots: "Лоты", high: "ВЫСОКАЯ 💎", stable: "СТАБИЛЬНАЯ ✅", coll: "РЕДКАЯ ⚠️", lang_subtitle: "КВАНТОВЫЙ ТЕРМИНАЛ", live_feed: "ПРЯМОЙ ЭФИР РЫНКА", calc_title: "ROI КАЛЬКУЛЯТОР" },
        ua: { market: "РИНОК", calc: "КАЛЬКУЛЯТОР", news: "НОВИНИ", buy: "ЗАКУП", sell: "ПРОДАЖ", profit: "ПРИБУТОК", liq_check: "ЛІКВІДНІСТЬ", lots: "Лоти", high: "ВИСОКА 💎", stable: "СТАБІЛЬНА ✅", coll: "РІДКІСНА ⚠️", lang_subtitle: "КВАНТОВИЙ ТЕРМІНАЛ", live_feed: "ПРЯМИЙ ЕФІР РИНКУ", calc_title: "ROI КАЛЬКУЛЯТОР" },
        en: { market: "MARKET", calc: "CALCULATOR", news: "NEWS", buy: "BUY", sell: "SELL", profit: "PROFIT", liq_check: "LIQUIDITY", lots: "Lots", high: "HIGH 💎", stable: "STABLE ✅", coll: "COLLECTIBLE ⚠️", lang_subtitle: "QUANTUM TERMINAL", live_feed: "LIVE MARKET FEED", calc_title: "ROI CALCULATOR" }
    };

    let currentLang = localStorage.getItem('ui_lang') || new URLSearchParams(location.search).get('lang') || null;

    function applyLang() {
        const T = translations[currentLang] || translations.en;
        document.querySelectorAll('[data-t]').forEach(el => {
            const key = el.getAttribute('data-t');
            if (T[key]) el.innerText = T[key];
        });
    }

    function setLang(lang) {
        currentLang = lang;
        localStorage.setItem('ui_lang', lang);
        applyLang(); 
        
        const langScreen = document.getElementById('screen-lang');
        langScreen.style.opacity = '0';
        
        setTimeout(() => {
            langScreen.classList.remove('active');
            langScreen.style.display = 'none';
            document.getElementById('main-nav').style.display = 'flex';
            showScreen('market');
            startFeeds();
        }, 400);
    }

    function showScreen(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen-' + id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        if(el) el.classList.add('active');
    }

    function initApp() {
        if (!currentLang) {
            document.getElementById('screen-lang').classList.add('active');
        } else {
            document.getElementById('screen-lang').classList.remove('active');
            document.getElementById('main-nav').style.display = 'flex';
            showScreen('market');
            applyLang();
            startFeeds();
        }
    }

    function startFeeds() {
        updateMarket();
        setInterval(updateMarket, 5000);
        addNews();
        setInterval(addNews, 10000);
    }

    const skins = [
        { n: "AK-47 | Nightwish", p: 85.40, g: "+4.2%", vol: 412 },
        { n: "M4A1-S | Printstream", p: 142.10, g: "+1.8%", vol: 580 },
        { n: "AWP | Gungnir", p: 12400, g: "+0.4%", vol: 18 },
        { n: "Glove | Vice", p: 940.00, g: "-1.2%", vol: 84 },
        { n: "Desert Eagle | Blaze", p: 620.45, g: "+5.1%", vol: 176 }
    ];

    function updateMarket() {
        const list = document.getElementById('market-list');
        if (!list) return;
        const T = translations[currentLang] || translations.en;
        list.innerHTML = skins.map(s => {
            const liq = s.vol > 300 ? {t: T.high, c: "#00ffcc"} : s.vol > 50 ? {t: T.stable, c: "#ffa500"} : {t: T.coll, c: "#ff4b2b"};
            return `
                <div class="card">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <b>${s.n}</b>
                        <span style="font-size:10px; opacity:0.3;">#${Math.floor(Math.random()*999)}</span>
                    </div>
                    <div class="price" style="margin: 10px 0;">$${s.p}</div>
                    <div style="display:flex; justify-content:space-between; font-size:11px;">
                        <span style="color: ${liq.c}">${liq.t}</span>
                        <span style="opacity:0.5">${T.lots}: ${s.vol}</span>
                    </div>
                </div>`;
        }).join('');
    }

    function calcROI() {
        const buy = parseFloat(document.getElementById('buy-price').value) || 0;
        const sell = parseFloat(document.getElementById('sell-price').value) || 0;
        const T = translations[currentLang] || translations.en;
        const net = (sell * 0.85) - buy;
        const roi = buy > 0 ? (net / buy * 100).toFixed(1) : 0;
        const color = net >= 0 ? 'var(--accent)' : 'var(--red)';
        const resBox = document.getElementById('calc-result');
        resBox.style.color = color;
        resBox.style.borderColor = color;
        resBox.innerHTML = `${T.profit}: $${net.toFixed(2)} (${roi}%)`;
    }

    function addNews() {
        const list = document.getElementById('news-list');
        if (!list) return;

        const newsData = {
            ru: ["Valve обновили политику Buff163", "Крупный закуп скинов M4A1-S", "Операция ожидается в июне", "Цены на кейсы стабильно растут"],
            ua: ["Valve оновили політику Buff163", "Великий закуп скінів M4A1-S", "Операція очікується в червні", "Ціни на кейси стабільно зростають"],
            en: ["Valve updated Buff163 policy", "Massive M4A1-S skins buy-out", "New operation expected in June", "Case prices are growing steadily"]
        };

        const activeLang = localStorage.getItem('ui_lang') || currentLang || 'en';
        const arr = newsData[activeLang] || newsData.en;
        const txt = arr[Math.floor(Math.random() * arr.length)];
        
        list.insertAdjacentHTML('afterbegin', `<div class="card" style="font-size:13px; border-left: 2px solid var(--blue);">${txt}</div>`);
        if (list.children.length > 4) list.lastChild.remove();
    }

    // Запуск
    initApp();
</script>
</body>
</html>
